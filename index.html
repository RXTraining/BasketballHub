<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RX.TRAINING</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0a0a0c; --panel:#141418; --panel2:#1c1c22; --line:#2a2a32;
    --txt:#f3f3f5; --muted:#9a9aa5; --accent:#ff6a00; --accent2:#ff9100;
    --green:#39d98a; --red:#ff5d6c; --blue:#4aa8ff; --yellow:#ffce4a;
    --radius:14px; --shadow:0 8px 28px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(255,106,0,.12),transparent 60%),var(--bg);
    color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 80px}

  header.top{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);
    background:rgba(10,10,12,.82);border-bottom:1px solid var(--line)}
  .topin{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px 18px}
  .logo{font-weight:900;letter-spacing:.5px;font-size:20px}
  .logo .dot{color:var(--accent)}
  nav.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-left:8px}
  nav.tabs button{background:transparent;border:0;color:var(--muted);font-weight:600;
    padding:9px 14px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s}
  nav.tabs button:hover{color:var(--txt);background:var(--panel)}
  nav.tabs button.active{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .rolewrap{margin-left:auto;display:flex;align-items:center;gap:10px}

  section.view{display:none;padding-top:26px;animation:fade .25s ease}
  section.view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h1.page{font-size:26px;font-weight:900;margin-bottom:4px}
  .sub{color:var(--muted);margin-bottom:22px;font-size:14px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .panel h3{font-size:15px;margin-bottom:14px;letter-spacing:.3px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  label.f{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:11px 12px;border-radius:10px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:70px}
  .field{flex:1;min-width:160px;margin-bottom:14px}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border:0;font-weight:800;
    padding:11px 18px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:7px 12px;font-size:12.5px}
  .btn.danger{background:var(--panel2);color:var(--red);border:1px solid var(--line)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    padding:4px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line)}
  .pill.green{color:var(--green);border-color:rgba(57,217,138,.35)}
  .pill.red{color:var(--red);border-color:rgba(255,93,108,.35)}
  .pill.blue{color:var(--blue);border-color:rgba(74,168,255,.35)}
  .pill.yellow{color:var(--yellow);border-color:rgba(255,206,74,.35)}
  .pill.orange{color:var(--accent2);border-color:rgba(255,145,0,.35)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;
    letter-spacing:.5px;padding:10px 10px;border-bottom:1px solid var(--line)}
  td{padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:30px;font-size:13.5px}
  .right{text-align:right}
  .actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);cursor:pointer;
    border-radius:8px;padding:6px 9px;font-size:12px}
  .iconbtn:hover{color:var(--txt)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:8px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-size:26px;font-weight:900;margin-top:6px}
  .stat .d{font-size:12px;margin-top:4px}
  .stat::after{content:"";position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),transparent);opacity:.12}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;
    z-index:100;padding:18px}
  .modal.show{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
  .modal .head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
  .modal .head h3{font-size:17px}
  .modal .body{padding:20px}
  .modal .foot{padding:16px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .x{background:transparent;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}

  .hero{background:linear-gradient(135deg,rgba(255,106,0,.15),rgba(255,145,0,.04)),var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:34px;margin-bottom:18px}
  .hero .badge{display:inline-block;font-size:12px;font-weight:700;color:var(--accent2);
    border:1px solid rgba(255,145,0,.35);border-radius:999px;padding:5px 12px;margin-bottom:14px}
  .hero h2{font-size:34px;font-weight:900;line-height:1.1;margin-bottom:12px}
  .hero p{color:#d9d9de;max-width:640px;line-height:1.6}
  .hl{color:var(--accent2);font-weight:700}

  .cards3{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
  .feat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .feat .ic{font-size:24px;margin-bottom:10px}
  .feat h4{font-size:15px;margin-bottom:6px}
  .feat p{color:var(--muted);font-size:13px;line-height:1.5}

  .chart-wrap{position:relative;height:230px}
  canvas{max-width:100%}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block}

  .flash{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120%);
    background:var(--green);color:#08130c;font-weight:800;padding:12px 22px;border-radius:12px;
    box-shadow:var(--shadow);z-index:400;transition:.35s;font-size:13.5px;max-width:90vw;text-align:center}
  .flash.show{transform:translateX(-50%) translateY(0)}
  .flash.warn{background:var(--yellow);color:#211c00}
  .seg{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .seg button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 14px;
    border-radius:999px;cursor:pointer;font-weight:600;font-size:13px}
  .seg button.active{background:var(--accent);color:#111;border-color:transparent}
  .small{font-size:12px}
  .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#111;font-size:13px}
  .nameceil{display:flex;align-items:center;gap:10px}
  .twocol{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
  @media(max-width:820px){.twocol{grid-template-columns:1fr}}
  .barrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .barrow .lab{width:90px;font-size:12px;color:var(--muted)}
  .bar{flex:1;height:10px;background:var(--panel2);border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .barrow .val{width:70px;text-align:right;font-size:12.5px;font-weight:700}
  .clienttag{font-size:11px;color:var(--muted)}
  .hidden{display:none!important}
  .credit{display:inline-block;font-size:11px;font-weight:800;color:#111;background:linear-gradient(135deg,var(--accent),var(--accent2));
    padding:3px 9px;border-radius:999px}
  .creditbar{height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;margin-top:6px}
  .creditbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}

  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .caldow{font-size:11px;color:var(--muted);text-align:center;font-weight:700;padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
  .calcell{background:var(--panel2);border:1px solid var(--line);border-radius:10px;min-height:92px;padding:6px;display:flex;flex-direction:column;gap:4px}
  .calcell.empty{background:transparent;border:0}
  .calcell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .caldate{font-size:11px;color:var(--muted);font-weight:700}
  .calcell.today .caldate{color:var(--accent)}
  .cchip{font-size:10.5px;font-weight:700;padding:3px 6px;border-radius:6px;cursor:pointer;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
  .cchip.t1on1{background:rgba(74,168,255,.22);border:1px solid rgba(74,168,255,.4);color:#bfe0ff}
  .cchip.tgroup{background:rgba(255,145,0,.2);border:1px solid rgba(255,145,0,.4);color:#ffd9a8}
  .cchip.done{opacity:.55}
  @media(max-width:640px){.calcell{min-height:70px}.cchip{font-size:9px}}

  .login{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:18px;
    background:radial-gradient(900px 500px at 70% -10%,rgba(255,106,0,.18),transparent 60%),var(--bg)}
  .login.show{display:flex}
  .login .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px;max-width:680px;width:100%;box-shadow:var(--shadow)}
  .loginrow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
  @media(max-width:640px){.loginrow{grid-template-columns:1fr}}
  .lbox{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:20px}
  .lbox .lh{font-weight:800;font-size:16px;margin-bottom:8px}
  .lbox p{margin-bottom:12px}
  .ownerbtn{position:absolute;top:18px;right:18px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:999px;cursor:pointer}
  .ownerbtn:hover{color:var(--txt);border-color:var(--accent)}
  .login p{margin-bottom:12px}
</style>
</head>
<body>
<header class="top">
  <div class="topin">
    <div class="logo">RX<span class="dot">.</span>TRAINING</div>
    <nav class="tabs" id="tabs"></nav>
    <div class="rolewrap" id="whoami"></div>
  </div>
</header>

<div class="wrap">
  <section class="view active" id="view-about"></section>
  <section class="view" id="view-booking"></section>
  <section class="view" id="view-customers"></section>
  <section class="view" id="view-locations"></section>
  <section class="view" id="view-availability"></section>
  <section class="view" id="view-finance"></section>
  <section class="view" id="view-admin"></section>
</div>

<div class="login" id="login">
  <button class="ownerbtn" onclick="toggleOwnerLogin(true)" title="Owner sign in">🔑 Owner</button>
  <div class="card" style="max-width:420px">
    <div class="logo" style="font-size:30px;margin-bottom:4px">RX<span class="dot">.</span>TRAINING</div>
    <div id="clientPanel">
      <div class="muted small" style="margin-bottom:18px">Player sign in</div>
      <p class="muted small" id="clientHint">Enter your name and password (or open your personal link).</p>
      <input id="loginClient" placeholder="Your full name" autocomplete="off" onkeydown="if(event.key==='Enter')clientLoginPick()">
      <input type="password" id="loginClientPwd" placeholder="Your password" style="margin-top:10px" onkeydown="if(event.key==='Enter')clientLoginPick()">
      <button class="btn" style="width:100%;margin-top:14px" onclick="clientLoginPick()">Sign in</button>
    </div>
    <div id="ownerPanel" class="hidden">
      <div class="muted small" style="margin-bottom:18px">🔑 Owner sign in</div>
      <p class="muted small" id="ownerHint">Enter your owner password.</p>
      <input type="password" id="loginPwd" placeholder="Owner password" onkeydown="if(event.key==='Enter')ownerLogin()">
      <button class="btn" style="width:100%;margin-top:14px" onclick="ownerLogin()">Enter owner mode</button>
      <button class="btn ghost" style="width:100%;margin-top:10px" onclick="toggleOwnerLogin(false)">← Back to player sign in</button>
    </div>
  </div>
</div>

<div class="login" id="connect">
  <div class="card" style="max-width:480px">
    <div class="logo" style="font-size:28px;margin-bottom:4px">RX<span class="dot">.</span>TRAINING</div>
    <div class="muted small" style="margin-bottom:16px">☁︎ Connect your Supabase database</div>
    <div class="field"><label class="f">Project URL</label><input id="supaUrl" placeholder="https://xxxx.supabase.co"></div>
    <div class="field"><label class="f">Anon public key</label><input id="supaKey" placeholder="eyJhbGciOi..."></div>
    <button class="btn" style="width:100%" onclick="saveSupaCfg()">Connect</button>
    <p class="muted small" style="margin-top:12px">Owner setup only. Find these in Supabase → Project Settings → API.</p>
  </div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <div class="head"><h3 id="mTitle">Title</h3><button class="x" onclick="closeModal()">&times;</button></div>
    <div class="body" id="mBody"></div>
    <div class="foot" id="mFoot"></div>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
/* ============================================================
   RX.TRAINING Manager — single-file app, localStorage backed
   ============================================================ */
const DB_KEY = 'rxtraining_v2';
const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>[...el.querySelectorAll(s)];
const money = n => '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate = d => d? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
const fmtDT = (d,t)=> d? new Date(d+'T'+(t||'00:00')).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
const todayISO = ()=> new Date().toISOString().slice(0,10);
const uid = ()=> Math.random().toString(36).slice(2,9);
const MAX_GROUP = 4;

/* ---------- Seed data ---------- */
function seed(){
  const minus = d=>{const x=new Date();x.setDate(x.getDate()-d);return x.toISOString().slice(0,10)};
  const plus = d=>{const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)};
  return {
    settings:{rate1on1:30, rateGroup:20, defaultClientPwd:'rxtraining'},
    locations:[{id:'l1',name:'Lexington Gym',address:'Lexington, MA'},{id:'l2',name:'Community Center Court',address:''}],
    customers:[
      {id:'c1',name:'Ethan Carter',phone:'781-555-0142',email:'ethan.c@example.com',parent:'Mia Carter',level:'AAU U14',notes:'Working on left-hand finishing.',created:minus(60),creditsTotal:{'1on1':10,'group':0},packages:[{id:'p1',type:'1on1',qty:10,amount:300,date:minus(34)}]},
      {id:'c2',name:'Sophia Nguyen',phone:'781-555-0188',email:'sophia.n@example.com',parent:'',level:'Middle School',notes:'Great shooter, build defense.',created:minus(40),creditsTotal:{'1on1':0,'group':0},packages:[]},
      {id:'c3',name:'Liam OBrien',phone:'617-555-0110',email:'liam.ob@example.com',parent:'Dan OBrien',level:'AAU U16',notes:'Conditioning + ball handling.',created:minus(20),creditsTotal:{'1on1':0,'group':0},packages:[]},
      {id:'c4',name:'Ava Martinez',phone:'339-555-0173',email:'ava.m@example.com',parent:'Rosa Martinez',level:'Youth',notes:'',created:minus(8),creditsTotal:{'1on1':0,'group':0},packages:[]}
    ],
    sessions:[
      {id:'s0a',customerIds:['c1'],type:'1on1',date:minus(34),time:'16:00',dur:60,price:30,status:'completed',paid:true,paidVia:'package',checkedIn:true,location:'Lexington Gym',notes:''},
      {id:'s0b',customerIds:['c2','c3'],type:'group',date:minus(28),time:'10:00',dur:90,price:60,status:'completed',paid:true,paidVia:'cash',checkedIn:true,location:'Lexington Gym',notes:''},
      {id:'s0c',customerIds:['c2'],type:'1on1',date:minus(20),time:'15:00',dur:60,price:30,status:'completed',paid:true,paidVia:'cash',checkedIn:true,location:'Lexington Gym',notes:''},
      {id:'s0d',customerIds:['c1','c3','c4'],type:'group',date:minus(14),time:'11:00',dur:90,price:90,status:'completed',paid:true,paidVia:'cash',checkedIn:true,location:'Lexington Gym',notes:''},
      {id:'s1',customerIds:['c1'],type:'1on1',date:minus(7),time:'16:00',dur:60,price:30,status:'completed',paid:true,paidVia:'package',checkedIn:true,location:'Lexington Gym',notes:''},
      {id:'s2',customerIds:['c2','c3','c4'],type:'group',date:minus(3),time:'10:00',dur:90,price:90,status:'completed',paid:true,paidVia:'cash',checkedIn:true,location:'Lexington Gym',notes:'Group skills'},
      {id:'s3',customerIds:['c1'],type:'1on1',date:plus(1),time:'17:00',dur:60,price:30,status:'scheduled',paid:true,paidVia:'package',checkedIn:false,location:'Lexington Gym',notes:'Prepaid'},
      {id:'s4',customerIds:['c2'],type:'1on1',date:plus(2),time:'15:30',dur:60,price:30,status:'scheduled',paid:false,paidVia:'',checkedIn:false,location:'Lexington Gym',notes:''},
      {id:'s5',customerIds:['c3','c4'],type:'group',date:plus(4),time:'11:00',dur:90,price:60,status:'scheduled',paid:false,paidVia:'',checkedIn:false,location:'Community Center Court',notes:''}
    ],
    expenses:[
      {id:'e1',date:minus(15),cat:'Gym Rental',amount:200,note:'Court time'},
      {id:'e2',date:minus(10),cat:'Equipment',amount:85,note:'Cones & balls'}
    ],
    cashEntries:[]
  };
}
/* ===== Supabase config — paste here to enable cloud sync on ALL devices ===== */
const SUPABASE_URL = "https://hlqesgnemuquwxetyhaw.supabase.co";        // e.g. https://abcd1234.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhscWVzZ25lbXVxdXd4ZXR5aGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTM1NDcsImV4cCI6MjA5ODE4OTU0N30.n8xYCIg7eSq-V2dyRPkUDQ8Vdwtgn65LINwZKcV2UjU";   // your anon public key
const MEDIA_BUCKET = "rx-media";
const STATE_TABLE = "rx_state";
/* =========================================================================== */
let DB = {}, supa = null, SUPA_OK = false, cloudTimer = null, localOnly = false;

function getSupaCfg(){
  try{const r=localStorage.getItem('rx_supa');if(r){const c=JSON.parse(r);if(c&&c.url&&c.key)return c;}}catch(e){}
  if(SUPABASE_URL&&SUPABASE_ANON_KEY)return{url:SUPABASE_URL,key:SUPABASE_ANON_KEY};
  return null;
}
function saveSupaCfg(){
  const url=($('#supaUrl').value||'').trim(), key=($('#supaKey').value||'').trim();
  if(!url||!key)return flash('Enter both the Project URL and anon key',true);
  localStorage.setItem('rx_supa',JSON.stringify({url,key}));
  location.reload();
}
function useLocalOnly(){localStorage.setItem('rx_localonly','1');location.reload();}

function normalize(d){
  if(!d)d=seed();
  d.settings=d.settings||{rate1on1:30,rateGroup:20};
  if(d.settings.defaultClientPwd===undefined)d.settings.defaultClientPwd='rxtraining';
  if(!d.cashEntries)d.cashEntries=[];
  if(!d.locations){const names=[...new Set((d.sessions||[]).map(s=>s.location).filter(Boolean))];if(!names.length)names.push('Lexington Gym');d.locations=names.map(n=>({id:uid(),name:n,address:''}));}
  if(!d.availability)d.availability=[];
  (d.customers||[]).forEach(c=>{
    if(!c.packages)c.packages=[];
    if(!c.creditsTotal){
      const pk={'1on1':0,'group':0};c.packages.forEach(p=>{pk[p.type]=(pk[p.type]||0)+p.qty;});
      const oldRem=c.credits||{'1on1':0,'group':0};
      const usedD=t=>(d.sessions||[]).filter(s=>s.customerIds.includes(c.id)&&s.type===t&&s.paidVia==='package'&&s.status!=='cancelled').length;
      c.creditsTotal={'1on1':Math.max(pk['1on1'],(oldRem['1on1']||0)+usedD('1on1')),'group':Math.max(pk['group'],(oldRem['group']||0)+usedD('group'))};
    }
    if(c.credits)delete c.credits;
    if(!c.pwd)c.pwd=d.settings.defaultClientPwd;
  });
  (d.sessions||[]).forEach(s=>{if(s.paidVia===undefined)s.paidVia=s.paid?'cash':'';});
  return d;
}
function localData(){let d;try{const r=localStorage.getItem(DB_KEY);if(r)d=JSON.parse(r);}catch(e){}return normalize(d);}

/* ----- relational mapping (separate tables in Supabase) ----- */
function assemble(st,loc,cus,pkg,ses,exp,cash,avail){
  const d={};
  d.settings={rate1on1:st?Number(st.rate1on1):30,rateGroup:st?Number(st.rate_group):20,defaultClientPwd:st?(st.default_client_pwd||'rxtraining'):'rxtraining',ownerPwd:st?(st.owner_pwd||''):''};
  d.locations=(loc||[]).map(l=>({id:l.id,name:l.name,address:l.address||''}));
  d.availability=(avail||[]).map(a=>({id:a.id,date:a.date,start:a.start_t,end:a.end_t,slotMin:a.slot_min||60,location:a.location||''}));
  d.customers=(cus||[]).map(c=>({id:c.id,name:c.name,phone:c.phone||'',email:c.email||'',parent:c.parent||'',level:c.level||'',notes:c.notes||'',created:c.created||'',creditsTotal:c.credits_total||{'1on1':0,'group':0},pwd:c.pwd||'',token:c.token||'',
    packages:(pkg||[]).filter(p=>p.customer_id===c.id).map(p=>({id:p.id,type:p.type,qty:p.qty,amount:Number(p.amount),date:p.date}))}));
  d.sessions=(ses||[]).map(s=>({id:s.id,customerIds:s.customer_ids||[],type:s.type,date:s.date,time:s.time,dur:s.dur,price:Number(s.price),status:s.status,paid:!!s.paid,paidVia:s.paid_via||'',checkedIn:!!s.checked_in,location:s.location||'',notes:s.notes||'',feedback:s.feedback||'',media:s.media||[]}));
  d.expenses=(exp||[]).map(e=>({id:e.id,date:e.date,cat:e.cat,amount:Number(e.amount),note:e.note||''}));
  d.cashEntries=(cash||[]).map(e=>({id:e.id,date:e.date,amount:Number(e.amount),note:e.note||'',customerId:e.customer_id||'',type:e.type||'1on1',qty:e.qty||1}));
  return normalize(d);
}
const custRow=c=>({id:c.id,name:c.name,phone:c.phone||'',email:c.email||'',parent:c.parent||'',level:c.level||'',notes:c.notes||'',created:c.created||'',credits_total:c.creditsTotal||{'1on1':0,'group':0},pwd:c.pwd||'',token:c.token||''});
const sessRow=s=>({id:s.id,customer_ids:s.customerIds||[],type:s.type,date:s.date,time:s.time,dur:s.dur,price:s.price,status:s.status,paid:!!s.paid,paid_via:s.paidVia||'',checked_in:!!s.checkedIn,location:s.location||'',notes:s.notes||'',feedback:s.feedback||'',media:s.media||[]});
async function migrateSource(){
  try{const {data}=await supa.from(STATE_TABLE).select('data').eq('id','main').maybeSingle();if(data&&data.data)return normalize(data.data);}catch(e){}
  return localData();
}
async function bootLoad(){
  const cfg=getSupaCfg();
  if(cfg && window.supabase){
    try{
      supa=window.supabase.createClient(cfg.url,cfg.key);
      const [st,loc,cus,pkg,ses,exp,cash,avail]=await Promise.all([
        supa.from('settings').select('*').eq('id','main').maybeSingle(),
        supa.from('locations').select('*'), supa.from('customers').select('*'),
        supa.from('packages').select('*'), supa.from('sessions').select('*'),
        supa.from('expenses').select('*'), supa.from('cash_entries').select('*'),
        supa.from('availability').select('*')]);
      const err=[st,loc,cus,pkg,ses,exp,cash,avail].find(r=>r.error); if(err) throw err.error;
      SUPA_OK=true;
      const empty=!st.data && !(cus.data&&cus.data.length) && !(ses.data&&ses.data.length);
      if(empty){ DB=await migrateSource(); await cloudPush(); return DB; }
      return assemble(st.data,loc.data,cus.data,pkg.data,ses.data,exp.data,cash.data,avail.data);
    }catch(e){console.warn('Supabase offline:',e.message);SUPA_OK=false;}
  }
  return localData();
}

function save(){
  try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}
  if(supa&&SUPA_OK){clearTimeout(cloudTimer);cloudTimer=setTimeout(cloudPush,500);}
  return true;
}
async function syncTable(name,rows){
  if(rows.length) {const {error}=await supa.from(name).upsert(rows); if(error) throw error;}
  const ids=rows.map(r=>r.id);
  if(ids.length){await supa.from(name).delete().not('id','in','('+ids.map(x=>'"'+x+'"').join(',')+')');}
  else{await supa.from(name).delete().neq('id','__none__');}
}
async function cloudPush(){
  if(!supa||!SUPA_OK)return;
  try{
    await supa.from('settings').upsert({id:'main',rate1on1:DB.settings.rate1on1,rate_group:DB.settings.rateGroup,default_client_pwd:DB.settings.defaultClientPwd,owner_pwd:DB.settings.ownerPwd||null});
    await syncTable('locations',DB.locations.map(l=>({id:l.id,name:l.name,address:l.address||''})));
    await syncTable('customers',DB.customers.map(custRow));
    await syncTable('packages',DB.customers.flatMap(c=>c.packages.map(p=>({id:p.id,customer_id:c.id,type:p.type,qty:p.qty,amount:p.amount,date:p.date}))));
    await syncTable('sessions',DB.sessions.map(sessRow));
    await syncTable('expenses',DB.expenses.map(e=>({id:e.id,date:e.date,cat:e.cat,amount:e.amount,note:e.note||''})));
    await syncTable('cash_entries',DB.cashEntries.map(e=>({id:e.id,date:e.date,amount:e.amount,note:e.note||'',customer_id:e.customerId||null,type:e.type||null,qty:e.qty||null})));
    await syncTable('availability',(DB.availability||[]).map(a=>({id:a.id,date:a.date,start_t:a.start,end_t:a.end,slot_min:a.slotMin,location:a.location||''})));
  }catch(e){flash('Cloud save failed — saved on this device',true);}
}

/* ---------- helpers ---------- */
const custById = id => DB.customers.find(c=>c.id===id);
const custNames = ids => ids.map(i=>{const c=custById(i);return c?c.name:'?';}).join(', ');
const initials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const firstName = n => n.split(' ')[0];
function computePrice(type,dur,n){const h=(dur||60)/60;return Math.round(type==='1on1'?DB.settings.rate1on1*h:DB.settings.rateGroup*h*(n||1));}
function totalFor(c,type){return (c&&c.creditsTotal&&c.creditsTotal[type])||0;}
function usedFor(c,type){if(!c)return 0;const done=DB.sessions.filter(s=>s.customerIds.includes(c.id)&&s.type===type&&s.paidVia==='package'&&s.status==='completed').length;return Math.min(totalFor(c,type),done);}
function completedCount(c){return DB.sessions.filter(s=>s.customerIds.includes(c.id)&&s.status==='completed').length;}
function bookedCount(c){return DB.sessions.filter(s=>s.customerIds.includes(c.id)&&s.status==='scheduled'&&s.date>=todayISO()).length;}
function creditsFor(c,type){return Math.max(0,totalFor(c,type)-usedFor(c,type));}
function creditBadge(c){
  const parts=[];
  [['1on1','1:1'],['group','Grp']].forEach(([t,lab])=>{const tot=totalFor(c,t);if(tot>0)parts.push(lab+' '+usedFor(c,t)+'/'+tot+' used');});
  return parts.length?parts.map(p=>'<span class="credit">'+p+'</span>').join(' '):'<span class="muted small">—</span>';
}
function sessionHasCredit(s){return s.customerIds.some(id=>creditsFor(custById(id),s.type)>0);}
function locOptions(selected){
  const names=DB.locations.map(l=>l.name);
  let out=DB.locations.map(l=>`<option ${l.name===selected?'selected':''}>${l.name}</option>`).join('');
  if(selected && !names.includes(selected)) out='<option selected>'+selected+'</option>'+out;
  if(!out) out='<option value="">Add a location first</option>';
  return out;
}

/* ---------- Export all data to Excel (multi-sheet) ---------- */
function exportExcel(){
  if(typeof XLSX==='undefined')return flash('Export needs internet to load the Excel library',true);
  const wb=XLSX.utils.book_new();
  const add=(name,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.length?rows:[{}]),name);

  const cashSess=DB.sessions.filter(s=>s.paid&&s.paidVia==='cash'&&s.status!=='cancelled').reduce((a,s)=>a+s.price,0);
  const pkgRev=DB.customers.flatMap(c=>c.packages).reduce((a,p)=>a+p.amount,0);
  const otherCash=DB.cashEntries.reduce((a,e)=>a+e.amount,0);
  const expenses=DB.expenses.reduce((a,e)=>a+e.amount,0);
  const outstanding=DB.sessions.filter(s=>!s.paid&&s.status!=='cancelled').reduce((a,s)=>a+s.price,0);
  const revenue=cashSess+pkgRev+otherCash;
  add('Finance',[
    {Metric:'Revenue (collected)',Amount:revenue},
    {Metric:'  Cash — sessions',Amount:cashSess},
    {Metric:'  Cash — other income',Amount:otherCash},
    {Metric:'  Packages',Amount:pkgRev},
    {Metric:'Outstanding (unpaid)',Amount:outstanding},
    {Metric:'Expenses',Amount:expenses},
    {Metric:'Net profit',Amount:revenue-expenses},
    {Metric:'1:1 rate / hr',Amount:DB.settings.rate1on1},
    {Metric:'Group rate / hr',Amount:DB.settings.rateGroup}
  ]);
  add('Customers',DB.customers.map(c=>({Name:c.name,Phone:c.phone,Email:c.email,Parent:c.parent,Level:c.level,
    '1:1 used':usedFor(c,'1on1'),'1:1 total':totalFor(c,'1on1'),'1:1 left':creditsFor(c,'1on1'),
    'Group used':usedFor(c,'group'),'Group total':totalFor(c,'group'),'Group left':creditsFor(c,'group'),
    Password:c.pwd,Created:c.created,Notes:c.notes})));
  add('Locations',DB.locations.map(l=>({Name:l.name,Address:l.address,Sessions:DB.sessions.filter(s=>s.location===l.name).length})));
  add('Booking & Schedule',sortSessions(DB.sessions).map(s=>({Date:s.date,Time:s.time,Clients:custNames(s.customerIds),
    Type:s.type==='1on1'?'1:1':'Group',Players:s.customerIds.length,Duration:s.dur,Location:s.location,Status:s.status,
    'Checked in':s.checkedIn?'Yes':'No',Payment:s.paid?(s.paidVia||'paid'):'unpaid',Price:s.price,Notes:s.notes,Feedback:s.feedback||'',Attachments:(s.media||[]).length})));
  add('Packages',DB.customers.flatMap(c=>c.packages.map(p=>({Client:c.name,Date:p.date,Type:p.type==='1on1'?'1:1':'Group',Sessions:p.qty,Amount:p.amount}))));
  add('Expenses',DB.expenses.map(e=>({Date:e.date,Category:e.cat,Note:e.note,Amount:e.amount})));
  add('Cash income',[
    ...DB.sessions.filter(s=>s.paid&&s.paidVia==='cash'&&s.status!=='cancelled').map(s=>({Date:s.date,Source:custNames(s.customerIds)+' ('+(s.type==='1on1'?'1:1':'Group')+' session)',Note:s.notes||'',Amount:s.price})),
    ...DB.cashEntries.map(e=>({Date:e.date,Source:(e.customerId&&custById(e.customerId)?custById(e.customerId).name:'Walk-in')+' ('+(e.qty||1)+'× '+(e.type==='group'?'Group':'1:1')+' cash)',Note:e.note||'',Amount:e.amount}))
  ]);
  XLSX.writeFile(wb,'RXTraining-export-'+todayISO()+'.xlsx');
  flash('Excel exported ⬇');
}

function renderBookingTable(){
  const now=todayISO();
  let list = sortSessions(DB.sessions);
  if(bookFilter==='upcoming') list=list.filter(s=>s.date>=now && s.status!=='cancelled');
  else if(bookFilter==='past') list=list.filter(s=>s.date<now||s.status==='completed').reverse();
  else if(bookFilter==='checkin') list=list.filter(s=>s.date===now);

  const rows = list.map(s=>{
    const statusPill = s.status==='completed'?'<span class="pill green">Completed</span>':
      s.status==='cancelled'?'<span class="pill red">Cancelled</span>':'<span class="pill yellow">Scheduled</span>';
    const checkCell = s.checkedIn?'<span class="pill green">✓ In</span>':
      (s.date<=now && s.status!=='cancelled'?`<button class="iconbtn" onclick="ownerCheckIn('${s.id}')">Check in</button>`:'<span class="pill">—</span>');
    let payCell;
    if(s.paid){payCell='<span class="pill green">Paid</span><div class="clienttag">'+(s.paidVia==='package'?'package':'cash')+'</div>';}
    else{payCell=`<div class="actions" style="justify-content:flex-start">
        ${sessionHasCredit(s)?`<button class="iconbtn" title="Use prepaid credit" onclick="payCredit('${s.id}')">Credit</button>`:''}
        <button class="iconbtn" onclick="payCash('${s.id}')">Cash</button></div>`;}
    return `<tr>
      <td><b>${fmtDT(s.date,s.time)}</b><div class="clienttag">${s.dur} min · ${s.location||''}</div></td>
      <td>${custNames(s.customerIds)}<div class="clienttag">${typePill(s)}</div></td>
      <td>${statusPill}</td>
      <td>${checkCell}</td>
      <td>${payCell}</td>
      <td class="right">${money(s.price)}</td>
      <td class="right"><div class="actions">
        <button class="iconbtn" title="Calendar" onclick="addToCalendar('${s.id}')">📅</button>
        <button class="iconbtn" onclick="openSession('${s.id}')">Edit</button>
      </div></td>
    </tr>`;
  }).join('');

  $('#bookBody').innerHTML=`
    <div class="seg">
      ${['upcoming','checkin','past','all'].map(f=>`<button class="${bookFilter===f?'active':''}" onclick="bookFilter='${f}';renderBooking()">${({upcoming:'Upcoming',checkin:'Today / Check-in',past:'Past',all:'All'})[f]}</button>`).join('')}
    </div>
    <div class="panel" style="padding:6px 14px;overflow-x:auto">
      <table>
        <thead><tr><th>When</th><th>Client(s)</th><th>Status</th><th>Check-in</th><th>Payment</th><th class="right">Price</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="7"><div class="empty">No sessions in this view.</div></td></tr>'}</tbody>
      </table>
    </div>`;
}

function renderBookingCalendar(){
  const ref=new Date(calY,calM,1);
  const monthName=ref.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const firstDow=ref.getDay();
  const daysIn=new Date(calY,calM+1,0).getDate();
  const byDate={};
  DB.sessions.forEach(s=>{(byDate[s.date]=byDate[s.date]||[]).push(s);});
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells='';
  for(let i=0;i<firstDow;i++) cells+='<div class="calcell empty"></div>';
  for(let d=1;d<=daysIn;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = ds===todayISO();
    const chips=sortSessions(byDate[ds]||[]).map(s=>{
      const lab=(s.time)+' '+firstName(custNames(s.customerIds))+(s.customerIds.length>1?' +'+(s.customerIds.length-1):'');
      return `<div class="cchip ${s.type==='1on1'?'t1on1':'tgroup'} ${s.status==='completed'?'done':''}" title="${custNames(s.customerIds)} · ${s.location||''}" onclick="openSession('${s.id}')">${lab}</div>`;
    }).join('');
    cells+=`<div class="calcell ${isToday?'today':''}"><div class="caldate">${d}</div>${chips}</div>`;
  }
  $('#bookBody').innerHTML=`
    <div class="panel">
      <div class="calhead">
        <h3 style="margin:0">${monthName}</h3>
        <div class="row">
          <button class="iconbtn" onclick="calStep(-1)">‹ Prev</button>
          <button class="iconbtn" onclick="calToday()">Today</button>
          <button class="iconbtn" onclick="calStep(1)">Next ›</button>
        </div>
      </div>
      <div class="calgrid">${dows.map(d=>`<div class="caldow">${d}</div>`).join('')}${cells}</div>
      <div class="legend" style="margin-top:14px">
        <span><i class="swatch" style="background:#4aa8ff"></i>1:1</span>
        <span><i class="swatch" style="background:#ff9100"></i>Group</span>
        <span class="muted">Click a session to edit · faded = completed</span>
      </div>
    </div>`;
}
function calStep(n){calM+=n;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderBooking();}
function calToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderBooking();}

function submitRequest(){
  const cid=clientAs;if(!cid)return flash('Please sign in again',true);
  const type=$('#rqType').value;
  const dur=type==='1on1'?60:90;
  const slot=$('#rqSlot')?$('#rqSlot').value:'';
  if(!slot)return flash('No open time slot selected — pick another date',true);
  const [time,loc]=slot.split('|');
  DB.sessions.push({id:uid(),customerIds:[cid],type,date:$('#rqDate').value,time,
    dur,price:computePrice(type,dur,1),status:'scheduled',paid:false,paidVia:'',checkedIn:false,location:loc||'TBD',notes:'Client request'});
  save();flash('Session requested! 🏀');renderBooking();
}

function clientCheckIn(id){
  const s=DB.sessions.find(x=>x.id===id);s.checkedIn=true;
  const c=custById(clientAs);
  if(!s.paid && creditsFor(c,s.type)>0){
    s.paid=true;s.paidVia='package';
    save();flash("Checked in — 1 credit used. Let's work! 🔥");
  }else{save();flash("Checked in — let's work! 🔥");}
  renderBooking();
}
function ownerCheckIn(id){const s=DB.sessions.find(x=>x.id===id);s.checkedIn=true;save();flash('Checked in');refreshOwner();}

/* session feedback media (photos/videos stored with the session) */
const mUrl=m=>m.url||m.data||'';
async function addMediaFiles(input){
  const files=[...input.files];input.value='';
  for(const f of files){
    if(f.size>50*1024*1024){flash(f.name+' is too large (max 50MB)',true);continue;}
    const type=f.type.indexOf('video')===0?'video':'image';
    if(supa&&SUPA_OK){
      const path='media/'+uid()+'-'+(f.name||'file').replace(/[^a-zA-Z0-9._-]/g,'_');
      flash('Uploading '+f.name+'…');
      const up=await supa.storage.from(MEDIA_BUCKET).upload(path,f,{upsert:true,contentType:f.type});
      if(up.error){flash('Upload failed: '+up.error.message,true);continue;}
      const pub=supa.storage.from(MEDIA_BUCKET).getPublicUrl(path);
      editMedia.push({type,name:f.name,url:pub.data.publicUrl,path});
      renderMediaPrev();
    }else{
      if(f.size>8*1024*1024){flash('Connect Supabase to upload large files',true);continue;}
      const r=new FileReader();
      r.onload=()=>{editMedia.push({type,name:f.name,data:r.result});renderMediaPrev();};
      r.readAsDataURL(f);
    }
  }
}
function renderMediaPrev(){
  const el=$('#sMediaPrev');if(!el)return;
  el.innerHTML=editMedia.length?editMedia.map((m,i)=>`<div style="position:relative;display:inline-block;margin:0 8px 8px 0;vertical-align:top">
    ${m.type==='image'?`<img src="${mUrl(m)}" style="width:84px;height:84px;object-fit:cover;border-radius:8px">`:`<video src="${mUrl(m)}" style="width:84px;height:84px;object-fit:cover;border-radius:8px"></video>`}
    <button class="iconbtn" style="position:absolute;top:-8px;right:-8px;padding:2px 7px" onclick="rmMedia(${i})">✕</button></div>`).join(''):'<span class="clienttag">No attachments yet.</span>';
}
function rmMedia(i){const m=editMedia[i];if(m&&m.path&&supa&&SUPA_OK){supa.storage.from(MEDIA_BUCKET).remove([m.path]).catch(()=>{});}editMedia.splice(i,1);renderMediaPrev();}
function viewMedia(sid,i){const s=DB.sessions.find(x=>x.id===sid);const m=s&&s.media&&s.media[i];if(!m)return;
  openModal(m.name||'Attachment',m.type==='image'?`<img src="${mUrl(m)}" style="max-width:100%;border-radius:10px">`:`<video src="${mUrl(m)}" controls autoplay style="max-width:100%;border-radius:10px"></video>`,`<button class="btn" onclick="closeModal()">Close</button>`);}
function mediaThumbs(s,owner){
  if(!s.media||!s.media.length)return '';
  return s.media.map((m,i)=>m.type==='image'
    ?`<img src="${mUrl(m)}" onclick="viewMedia('${s.id}',${i})" style="width:90px;height:90px;object-fit:cover;border-radius:8px;margin:6px 6px 0 0;cursor:pointer">`
    :`<video src="${mUrl(m)}" controls style="width:150px;border-radius:8px;margin:6px 6px 0 0"></video>`).join('');
}

function closeSessionEditor(){const rc=sessionReturnCust;sessionReturnCust=null;if(rc&&custById(rc))viewCustomer(rc);else closeModal();}
function recalcPrice(){
  const type=$('#sType').value, dur=+$('#sDur').value||60;
  const n=Math.max(1,$$('.sCustCb').filter(cb=>cb.checked).length);
  $('#sPrice').value=computePrice(type,dur,n);
}
function afterSessionSave(){const rc=sessionReturnCust;sessionReturnCust=null;closeModal();if(rc&&custById(rc))viewCustomer(rc);else refreshOwner();}
function saveSession(id){
  const ids=$$('.sCustCb').filter(cb=>cb.checked).map(cb=>cb.value);
  if(!ids.length)return flash('Tick at least one client',true);
  const type=$('#sType').value;
  if(type==='group' && ids.length>MAX_GROUP) return flash('Groups are capped at '+MAX_GROUP+' players',true);
  const pay=$('#sPay').value;
  const obj={customerIds:ids,type,dur:+$('#sDur').value,date:$('#sDate').value,time:$('#sTime').value,

    feedback:$('#sFeedback').value,media:editMedia.slice()};

  else{obj.id=uid();DB.sessions.push(obj);}

}
function delSession(id){if(!confirm('Delete this session?'))return;DB.sessions=DB.sessions.filter(x=>x.id!==id);save();flash('Session deleted');afterSessionSave();}

function payCash(id){const s=DB.sessions.find(x=>x.id===id);s.paid=true;s.paidVia='cash';save();flash('Marked paid (cash) 💵');refreshOwner();}
function payCredit(id){const s=DB.sessions.find(x=>x.id===id);if(!sessionHasCredit(s))return flash('No prepaid credit available',true);s.paid=true;s.paidVia='package';save();flash('Credit applied 🎟️');refreshOwner();}

/* ---------- Calendar export (.ics + Google) ---------- */
function pad(n){return String(n).padStart(2,'0');}
function icsStamp(d,t){const dt=new Date(d+'T'+(t||'00:00'));return dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+'T'+pad(dt.getHours())+pad(dt.getMinutes())+'00';}
function endStamp(s){const end=new Date(s.date+'T'+s.time);end.setMinutes(end.getMinutes()+(s.dur||60));
  return end.getFullYear()+pad(end.getMonth()+1)+pad(end.getDate())+'T'+pad(end.getHours())+pad(end.getMinutes())+'00';}
function sessionTitle(s){return 'RX Training — '+(s.type==='1on1'?'1:1 ':'Group ')+custNames(s.customerIds);}
function buildICS(sessions){
  let out='BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//RX.TRAINING//Manager//EN\nCALSCALE:GREGORIAN\n';
  sessions.forEach(s=>{
    out+='BEGIN:VEVENT\nUID:'+s.id+'@rxtraining\n'+
      'DTSTART:'+icsStamp(s.date,s.time)+'\nDTEND:'+endStamp(s)+'\n'+
      'SUMMARY:'+sessionTitle(s)+'\n'+'LOCATION:'+(s.location||'')+'\n'+
      'DESCRIPTION:'+(s.notes||'Basketball training session')+'\n'+
      'BEGIN:VALARM\nTRIGGER:-PT1H\nACTION:DISPLAY\nDESCRIPTION:RX Training reminder\nEND:VALARM\n'+'END:VEVENT\n';
  });
  return out+'END:VCALENDAR';
}
function downloadICS(name,text){const b=new Blob([text],{type:'text/calendar'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function googleCalUrl(s){
  const p=new URLSearchParams({action:'TEMPLATE',text:sessionTitle(s),dates:icsStamp(s.date,s.time)+'/'+endStamp(s),
    details:s.notes||'Basketball training session',location:s.location||''});
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}
function addToCalendar(id){

/* open slots for a given date + session type.
   1:1 needs an empty slot; group stays open until it holds 4 clients total. */
function availableSlots(dateStr,type){
  if(!dateStr)return [];
  const now=new Date(); const seen={}; const out=[];
  const sessAt=t=>DB.sessions.filter(s=>s.date===dateStr&&s.time===t&&s.status!=='cancelled');
  (DB.availability||[]).filter(r=>r.date===dateStr).forEach(r=>{
    const step=r.slotMin||60; let [sh,sm]=r.start.split(':').map(Number); let [eh,em]=r.end.split(':').map(Number);
    let cur=sh*60+sm; const lim=eh*60+em;
    for(;cur+step<=lim;cur+=step){
      const t=String(Math.floor(cur/60)).padStart(2,'0')+':'+String(cur%60).padStart(2,'0');
      if(seen[t])continue;
      if(dateStr===todayISO() && new Date(dateStr+'T'+t)<now)continue;
      const at=sessAt(t); let open;
      if(type==='group'){
        const has1on1=at.some(s=>s.type==='1on1');
        const groupClients=at.filter(s=>s.type==='group').reduce((a,s)=>a+s.customerIds.length,0);
        open = !has1on1 && groupClients<MAX_GROUP;   // group full at 4 clients
      }else{
        open = at.length===0;                         // 1:1 needs the slot to itself
      }
      if(!open)continue;
      seen[t]=1; out.push({time:t,location:r.location,slotMin:step});
    }
  });
  return out.sort((a,b)=>a.time.localeCompare(b.time));
}
function renderSlots(){
  const sel=$('#rqSlot'); if(!sel)return;
  const type=$('#rqType')?$('#rqType').value:'1on1';
  const slots=availableSlots($('#rqDate').value,type);
  sel.innerHTML=slots.length?slots.map(s=>`<option value="${s.time}|${s.location}">${fmtT(s.time)} · ${s.location}</option>`).join(''):'<option value="">No open times this day</option>';
}

/* ============================================================
   FINANCE
   ============================================================ */
let finRange='6m';
function monthKey(d){return d.slice(0,7);}
function monthLabel(k){const[y,m]=k.split('-');return new Date(y,m-1,1).toLocaleDateString('en-US',{month:'short'});}
function renderFinance(){
  const cashSess=DB.sessions.filter(s=>s.paid&&s.paidVia==='cash'&&s.status!=='cancelled');
  const allPkgs=DB.customers.flatMap(c=>c.packages.map(p=>({...p,cust:c.name,custId:c.id})));
  const pkgRev=allPkgs.reduce((a,p)=>a+p.amount,0);
  const sessCash=cashSess.reduce((a,s)=>a+s.price,0);
  const otherCash=DB.cashEntries.reduce((a,e)=>a+e.amount,0);
  const cashRev=sessCash+otherCash;
  const revenue=pkgRev+cashRev;
  const outstanding=DB.sessions.filter(s=>!s.paid&&s.status!=='cancelled').reduce((a,s)=>a+s.price,0);
  const expenses=DB.expenses.reduce((a,e)=>a+e.amount,0);
  const profit=revenue-expenses;
  let remCredits=0, creditValue=0;
  DB.customers.forEach(c=>{
    ['1on1','group'].forEach(t=>{
      const rem=creditsFor(c,t); remCredits+=rem;
      const pk=c.packages.filter(p=>p.type===t);
      const paid=pk.reduce((a,p)=>a+p.amount,0), qty=pk.reduce((a,p)=>a+p.qty,0);
      const per=qty>0?paid/qty:(t==='1on1'?DB.settings.rate1on1:DB.settings.rateGroup); // price actually paid per session
      creditValue+=rem*per;
    });
  });

  const months=[];const n=finRange==='12m'?12:finRange==='3m'?3:6;
  const base=new Date();base.setDate(1);
  for(let i=n-1;i>=0;i--){const d=new Date(base);d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const revByM={},expByM={};
  cashSess.forEach(s=>{const k=monthKey(s.date);revByM[k]=(revByM[k]||0)+s.price;});
  DB.cashEntries.forEach(e=>{const k=monthKey(e.date);revByM[k]=(revByM[k]||0)+e.amount;});
  allPkgs.forEach(p=>{const k=monthKey(p.date);revByM[k]=(revByM[k]||0)+p.amount;});
  DB.expenses.forEach(e=>{const k=monthKey(e.date);expByM[k]=(expByM[k]||0)+e.amount;});
  const rev=months.map(m=>revByM[m]||0), exp=months.map(m=>expByM[m]||0), prof=months.map((m,i)=>rev[i]-exp[i]);

  const byType={'1on1':0,'group':0};
  cashSess.forEach(s=>byType[s.type]+=s.price);
  allPkgs.forEach(p=>byType[p.type]+=p.amount);
  const maxType=Math.max(byType['1on1'],byType['group'],1);

  const expRows=DB.expenses.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`<tr>
    <td>${fmtDate(e.date)}</td><td>${e.cat}</td><td class="muted">${e.note||''}</td>
    <td class="right">${money(e.amount)}</td>
    <td class="right"><div class="actions"><button class="iconbtn" onclick="openExpense('${e.id}')">Edit</button><button class="iconbtn" onclick="delExpense('${e.id}')">✕</button></div></td></tr>`).join('')
    ||'<tr><td colspan="5"><div class="empty">No expenses logged.</div></td></tr>';

  const unpaidRows=DB.sessions.filter(s=>!s.paid&&s.status!=='cancelled').sort((a,b)=>a.date.localeCompare(b.date)).map(s=>`<tr>
    <td>${fmtDate(s.date)}</td><td>${custNames(s.customerIds)}</td>
    <td>${s.type==='1on1'?'1:1':'Group'}</td><td class="right">${money(s.price)}</td>
    <td class="right"><div class="actions">${sessionHasCredit(s)?`<button class="btn sm ghost" onclick="payCredit('${s.id}')">Credit</button>`:''}<button class="btn sm" onclick="payCash('${s.id}')">Cash</button></div></td></tr>`).join('')
    ||'<tr><td colspan="5"><div class="empty">All caught up — nothing outstanding! 🎉</div></td></tr>';

  const manualRows=DB.cashEntries.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{const cn=e.customerId&&custById(e.customerId)?custById(e.customerId).name:'Walk-in';return `<tr>
    <td>${fmtDate(e.date)}</td><td>${cn}</td><td class="muted">${e.qty||1}× ${e.type==='group'?'Group':'1:1'} (cash)${e.note?' · '+e.note:''}</td><td class="right">${money(e.amount)}</td>
    <td class="right"><div class="actions"><button class="iconbtn" onclick="openCashEntry('${e.id}')">Edit</button><button class="iconbtn" onclick="delCashEntry('${e.id}')">✕</button></div></td></tr>`}).join('');
  const cashSessRows=cashSess.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`<tr>
    <td>${fmtDate(s.date)}</td><td>${custNames(s.customerIds)}</td><td class="muted">${s.type==='1on1'?'1:1':'Group'} session</td><td class="right">${money(s.price)}</td>
    <td class="right"><button class="iconbtn" onclick="openSession('${s.id}')">Edit</button></td></tr>`).join('');
  const cashRows=(manualRows+cashSessRows)||'<tr><td colspan="5"><div class="empty">No cash income yet.</div></td></tr>';

  const pkgRows=allPkgs.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`<tr><td>${fmtDate(p.date)}</td><td>${p.cust}</td><td class="muted">${p.qty}× ${p.type==='1on1'?'1:1':'Group'}</td><td class="right">${money(p.amount)}</td>
    <td class="right"><button class="iconbtn" onclick="openPackage('${p.custId}','${p.id}')">Edit</button></td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">No packages sold.</div></td></tr>';

  $('#view-finance').innerHTML=`
    <h1 class="page">Finance</h1>
    <div class="sub">Revenue, cashflow, profit, outstanding payments, and prepaid liability at a glance. Everything below is editable.</div>
    <div class="stats">
      <div class="stat"><div class="k">Revenue (collected)</div><div class="v">${money(revenue)}</div><div class="d" style="color:var(--green)">Cash ${money(cashRev)} + packages ${money(pkgRev)}</div></div>
      <div class="stat"><div class="k">Outstanding</div><div class="v">${money(outstanding)}</div><div class="d" style="color:var(--red)">Awaiting payment</div></div>
      <div class="stat"><div class="k">Expenses</div><div class="v">${money(expenses)}</div><div class="d muted">Total costs</div></div>
      <div class="stat"><div class="k">Net Profit</div><div class="v" style="color:${profit>=0?'var(--green)':'var(--red)'}">${money(profit)}</div><div class="d muted">Revenue − expenses</div></div>
    </div>

    <div class="twocol" style="margin-top:16px">
      <div class="panel">
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:6px">
          <h3 style="margin:0">Cashflow & Profit</h3>
          <div class="seg" style="margin:0">${['3m','6m','12m'].map(r=>`<button class="${finRange===r?'active':''}" onclick="finRange='${r}';renderFinance()">${r}</button>`).join('')}</div>
        </div>
        <div class="chart-wrap"><canvas id="cashChart"></canvas></div>
        <div class="legend">
          <span><i class="swatch" style="background:var(--accent)"></i>Revenue</span>
          <span><i class="swatch" style="background:var(--red)"></i>Expenses</span>
          <span><i class="swatch" style="background:var(--green)"></i>Profit</span>
        </div>
      </div>
      <div class="panel">
        <h3>Revenue by session type</h3>
        <div class="barrow"><div class="lab">1:1 Private</div><div class="bar"><i style="width:${byType['1on1']/maxType*100}%"></i></div><div class="val">${money(byType['1on1'])}</div></div>
        <div class="barrow"><div class="lab">Group / 1:N</div><div class="bar"><i style="width:${byType['group']/maxType*100}%"></i></div><div class="val">${money(byType['group'])}</div></div>
        <div class="panel" style="background:var(--panel2);margin-top:16px;padding:14px">
          <div class="clienttag">Prepaid liability (sessions owed)</div>
          <div style="font-size:20px;font-weight:900;margin-top:4px">${remCredits} sessions · ${money(creditValue)}</div>
          <div class="clienttag" style="margin-top:2px">Already collected, still to be delivered.</div>
        </div>
        <div class="clienttag" style="margin-top:14px">Rates & passwords are now in the <b style="color:var(--txt)">Admin</b> tab.</div>
      </div>
    </div>

    <div class="twocol" style="margin-top:16px">
      <div class="panel" style="padding:6px 14px;overflow-x:auto">
        <div class="row" style="justify-content:space-between;align-items:center;padding:12px 6px 0">
          <h3 style="margin:0">Cash & other income</h3><button class="btn sm" onclick="openCashEntry()">+ Add cash</button></div>
        <table><thead><tr><th>Date</th><th>Source</th><th>Note</th><th class="right">Amount</th><th></th></tr></thead><tbody>${cashRows}</tbody></table>
        <div class="clienttag" style="padding:6px">Session payments edit via their session; manual cash is editable here.</div>
      </div>
      <div class="panel" style="padding:6px 14px;overflow-x:auto">
        <div class="row" style="justify-content:space-between;align-items:center;padding:12px 6px 0"><h3 style="margin:0">Package revenue</h3><button class="btn sm" onclick="openSellPackage()">+ Add package</button></div>
        <table><thead><tr><th>Date</th><th>Client</th><th>Package</th><th class="right">Amount</th><th></th></tr></thead><tbody>${pkgRows}</tbody></table>
        <div class="clienttag" style="padding:6px">Edit a package to adjust its amount and the client's credit total.</div>
      </div>
    </div>

    <div class="twocol" style="margin-top:16px">
      <div class="panel" style="padding:6px 14px;overflow-x:auto">
        <div class="row" style="justify-content:space-between;align-items:center;padding:12px 6px 0"><h3 style="margin:0">Outstanding payments</h3></div>
        <table><thead><tr><th>Date</th><th>Client</th><th>Type</th><th class="right">Amount</th><th></th></tr></thead><tbody>${unpaidRows}</tbody></table>
      </div>
      <div class="panel" style="padding:6px 14px;overflow-x:auto">
        <div class="row" style="justify-content:space-between;align-items:center;padding:12px 6px 0">
          <h3 style="margin:0">Expenses</h3><button class="btn sm" onclick="openExpense()">+ Add</button></div>
        <table><thead><tr><th>Date</th><th>Category</th><th>Note</th><th class="right">Amount</th><th></th></tr></thead><tbody>${expRows}</tbody></table>
      </div>
    </div>`;
  drawCashChart(months.map(monthLabel),rev,exp,prof);
}

/* lightweight canvas chart (no libraries) */
function drawCashChart(labels,rev,exp,prof){
  const cv=$('#cashChart');if(!cv)return;
  const dpr=window.devicePixelRatio||1;const W=cv.clientWidth||600,H=cv.clientHeight||230;
  cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const padL=44,padR=8,padT=12,padB=24;
  const all=rev.concat(exp,prof);let max=Math.max(...all,10),min=Math.min(...prof,0);
  const range=max-min||1;
  const x0=padL,x1=W-padR,y0=padT,y1=H-padB;
  const xfor=i=>x0+(x1-x0)*(labels.length<=1?0.5:i/(labels.length-1));
  const yfor=v=>y1-(v-min)/range*(y1-y0);
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.fillStyle='#9a9aa5';ctx.font='10px sans-serif';
  for(let g=0;g<=4;g++){const v=min+range*g/4;const y=yfor(v);
    ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x1,y);ctx.stroke();
    ctx.fillText('$'+Math.round(v),4,y+3);}
  ctx.textAlign='center';labels.forEach((l,i)=>ctx.fillText(l,xfor(i),H-8));ctx.textAlign='start';
  const bw=Math.min(16,(x1-x0)/labels.length/3);
  rev.forEach((v,i)=>{const x=xfor(i);
    ctx.fillStyle='#ff6a00';ctx.fillRect(x-bw-1,yfor(v),bw,y1-yfor(v));
    ctx.fillStyle='#ff5d6c';ctx.fillRect(x+1,yfor(exp[i]),bw,y1-yfor(exp[i]));});
  ctx.strokeStyle='#39d98a';ctx.lineWidth=2.5;ctx.beginPath();
  prof.forEach((v,i)=>{const x=xfor(i),y=yfor(v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
  ctx.fillStyle='#39d98a';prof.forEach((v,i)=>{ctx.beginPath();ctx.arc(xfor(i),yfor(v),3,0,7);ctx.fill();});
}
